<!DOCTYPE html>
<html>
<head>
    <title>Guess Bob</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>Guess Bob</h1>
        
        <div id="status-bar">
            <div id="secret-box">Your Secret Shape: <span id="my-character" style="color:#00ff00">???</span></div>
            <div id="status">Connected!</div>
        </div>

        <div id="game-board" class="grid"></div>

        <div id="chat-section">
            <input type="text" id="name-input" placeholder="Your Name..." value="Player 1">
            <div id="messages"></div>
            <div style="display:flex;">
                <input type="text" id="chat-input" placeholder="Ask...">
                <button onclick="sendMsg()">Send</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
